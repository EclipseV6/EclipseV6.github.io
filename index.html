<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Eclipse OS 6.0.1</title>
  <link rel="icon" href="/assets/logo/logo.png" id="page-favicon">
  <style>
    /* Theme */
    :root{
      --bg-img: url('https://7-7-7-15.github.io/assets/backgrounds/crimson.png');
      --bg: #060606;
      --text: #f0f2f5;
      --muted: #9aa0a6;
      --accent: #ff1f3a;
      --accent-2: #c30f24;
      --panel: rgba(18,18,18,0.86);
      --radius: 12px;
      --taskbar-h: 62px;
      --shadow: 0 22px 48px rgba(0,0,0,0.75);
      --window-opacity: 0.95;
      --font: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }

    html,body{height:100%;margin:0;background:var(--bg) fixed center/cover var(--bg-img);font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased;}
    body{display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;}

    /* Desktop */
    #desktop{position:absolute;inset:0 0 var(--taskbar-h) 0;padding:18px;box-sizing:border-box;overflow:auto}

    /* Taskbar */
    #taskbar{height:var(--taskbar-h);display:flex;align-items:center;gap:12px;padding:0 18px;background:linear-gradient(180deg,rgba(0,0,0,0.56),rgba(0,0,0,0.66));border-top:1px solid rgba(255,255,255,0.03);box-shadow:var(--shadow);z-index:1600;backdrop-filter: blur(8px);}
    #start-btn{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(180deg,var(--accent),var(--accent-2));cursor:pointer}
    #taskbar-icons{display:flex;gap:10px;align-items:center}
    .taskbar-icon{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.06));border:1px solid rgba(255,255,255,0.03);cursor:pointer;position:relative}
    .taskbar-icon img{width:28px;height:28px;border-radius:6px}
    .taskbar-icon .dot{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--accent);display:none}
    .taskbar-icon.active .dot{display:block}
    #system-tray{margin-left:auto;display:flex;gap:12px;align-items:center;color:var(--muted);font-size:13px}

    /* Quick-left stack: store + quick search */
    #quick-left{position:fixed;left:18px;bottom:calc(var(--taskbar-h)+12px);z-index:1550;display:flex;flex-direction:column;gap:10px}
    .quick-btn{width:56px;height:56px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.06));cursor:pointer;border:1px solid rgba(255,255,255,0.03)}
    .quick-btn.search{ background: linear-gradient(180deg,var(--accent),var(--accent-2)); color: #fff; box-shadow:0 8px 28px rgba(200,0,40,0.18) }

    /* Desktop icons */
    .desktop-icon{position:absolute;width:100px;text-align:center;padding:6px;cursor:default;user-select:none}
    .desktop-icon img{width:64px;height:64px;border-radius:12px;display:block;margin:0 auto 6px;box-shadow:0 12px 34px rgba(0,0,0,0.6)}
    .desktop-icon span{display:block;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    /* Windows */
    .window{position:absolute;min-width:360px;min-height:260px;width:900px;height:600px;border-radius:var(--radius);background:linear-gradient(180deg,rgba(20,20,20,var(--window-opacity)),rgba(8,8,8,var(--window-opacity)));border:1px solid rgba(255,255,255,0.03);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;z-index:120;backdrop-filter:blur(8px)}
    .window.maximized{top:0!important;left:0!important;width:100vw!important;height:calc(100vh - var(--taskbar-h))!important;border-radius:0}
    .titlebar{height:56px;display:flex;align-items:center;gap:12px;padding:0 12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(0,0,0,0.04));border-bottom:1px solid rgba(255,255,255,0.02);cursor:grab}
    .title{font-weight:700;font-size:15px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .win-controls{display:flex;gap:8px;align-items:center}
    .control-btn{width:38px;height:38px;border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,0.02);display:grid;place-items:center;color:var(--text);cursor:pointer;transition:transform .09s}
    .control-btn:hover{transform:translateY(-3px);background:rgba(255,255,255,0.02)}
    .control-btn.close{background:linear-gradient(90deg,#ff4b61,#c61b2b);color:#fff}
    .content{flex:1;padding:12px;overflow:auto;color:var(--text);background:transparent;position:relative}

    /* Browser */
    .browser-toolbar{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.03));border:1px solid rgba(255,255,255,0.02)}
    .browser-btn{padding:8px 10px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.02);color:var(--text);cursor:pointer}
    .browser-address{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:999px;background:rgba(0,0,0,0.36);border:1px solid rgba(255,255,255,0.02);flex:1}
    .browser-address .label{color:var(--muted);font-size:12px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .browser-address input{border:none;outline:none;background:transparent;color:var(--text);font-size:14px;width:100%}
    .browser-favicon{width:18px;height:18px;border-radius:4px}
    .browser-page{flex:1;display:block;background:transparent}
    .browser-page iframe{width:100%;height:100%;border:0;display:block;background:transparent}

    /* Settings/Store */
    .settings-card{padding:14px;border-radius:12px;background:linear-gradient(180deg,rgba(18,18,18,0.9),rgba(12,12,12,0.9));border:1px solid rgba(255,255,255,0.03);box-shadow:0 10px 30px rgba(0,0,0,0.6)}
    .muted{color:var(--muted);font-size:13px}
    .switch{width:46px;height:26px;border-radius:999px;background:rgba(255,255,255,0.04);display:inline-block;position:relative;cursor:pointer}
    .switch .knob{position:absolute;left:4px;top:4px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .12s}
    .switch.on{background:linear-gradient(90deg,var(--accent),var(--accent-2))}
    .switch.on .knob{left:24px}
    .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .store-card{padding:12px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.03));border:1px solid rgba(255,255,255,0.02);box-shadow:0 10px 26px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:8px}
    .store-card img{width:96px;height:96px;border-radius:12px;object-fit:cover}
    .small-btn{padding:8px 10px;border-radius:8px;border:none;background:rgba(255,255,255,0.03);color:var(--text);cursor:pointer}
    .primary-btn{padding:8px 12px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff;cursor:pointer}

    /* iframe overlay when blocked */
    .iframe-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:linear-gradient(180deg,rgba(0,0,0,0.6),rgba(0,0,0,0.6));color:var(--text);gap:10px;padding:16px;text-align:center}

    /* toast */
    .eos-toast{position:fixed;right:20px;bottom:100px;background:rgba(0,0,0,0.7);color:#fff;padding:10px 12px;border-radius:8px;z-index:3000;box-shadow:0 8px 24px rgba(0,0,0,0.45)}

    @media (max-width:900px){
      .browser-address{max-width:520px}
      #quick-left{display:none}
    }
    /* Context Menu */
#context-menu{
  position:fixed;
  display:none;
  min-width:180px;
  background:rgba(18,18,18,.96);
  border:1px solid rgba(255,255,255,.05);
  border-radius:12px;
  backdrop-filter:blur(12px);
  box-shadow:0 20px 40px rgba(0,0,0,.6);
  overflow:hidden;
  z-index:99999;
}

.ctx-item{
  padding:12px 16px;
  cursor:pointer;
  color:var(--text);
  font-size:14px;
  transition:.15s;
}

.ctx-item:hover{
  background:rgba(255,31,58,.15);
  color:#fff;
}
    .pin-menu{
  position:fixed;
  background:#111;
  border:1px solid rgba(255,255,255,.06);
  border-radius:10px;
  overflow:hidden;
  z-index:99999;
  box-shadow:0 15px 40px rgba(0,0,0,.65);
}

.pin-item{
  padding:10px 14px;
  cursor:pointer;
  color:white;
}

.pin-item:hover{
  background:rgba(255,31,58,.2);
}
  </style>
</head>
<body>
  <div id="desktop">
    <div class="desktop-icon" style="top:20px; left:20px" data-app="browser" data-name="Browser">
      <img src="/assets/browsericons/browser.png" alt=""><span>Browser</span>
    </div>
    <div class="desktop-icon" style="top:20px; left:140px" data-app="files" data-name="Files">
      <img src="/assets/browsericons/files.png" alt=""><span>Files</span>
    </div>
    <div class="desktop-icon" style="top:20px; left:260px" data-app="settings" data-name="Settings">
      <img src="/assets/browsericons/settings.png" alt=""><span>Settings</span>
    </div>
    



  <div id="quick-left">
    <div class="quick-btn" id="quick-store" title="Store" aria-label="Store">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 7h18v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z" stroke="#fff" stroke-opacity=".95" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="quick-btn search" id="quick-search" title="Search" aria-label="Quick search">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M11 4a7 7 0 1 1 0 14 7 7 0 0 1 0-14z" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 21l-4.35-4.35" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div id="taskbar">
    <div id="start-btn" title="Launcher"></div>
    <div id="taskbar-icons" role="toolbar" aria-label="Open apps"></div>
    <div id="system-tray">
      <div class="tray-item" id="tray-wifi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M2 8.82C7.39 4.59 16.61 4.59 22 8.82" stroke="#fff" stroke-opacity=".7" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg><div id="wifi-status" class="muted">Offline</div></div>
      <div class="tray-item" id="tray-batt"><svg width="22" height="14" viewBox="0 0 24 14" fill="none"><rect x="1" y="1" width="18" height="12" rx="2" stroke="#fff" stroke-opacity=".12" stroke-width="1.2" fill="none"></rect><rect x="19.2" y="4.2" width="2.6" height="5.6" rx="0.6" fill="#fff" opacity=".08"></rect></svg><div id="batt-status" class="muted">--%</div></div>
      <div class="tray-item" id="tray-clock"></div>
    </div>
  </div>

  <!-- Launcher (hidden by default) -->
  <div id="launcher" style="position:fixed; left:18px; bottom:86px; width:480px; z-index:1400; display:none">
    <div style="padding:12px;border-radius:12px;background:var(--panel);border:1px solid rgba(255,255,255,0.03);box-shadow:var(--shadow)">
      <div style="display:flex;gap:10px;align-items:center">
        <input id="launcher-search" placeholder="Search apps..." style="flex:1;padding:10px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);color:var(--text)">
        <button id="launcher-close" class="control-btn">✕</button>
      </div>
      <hr style="margin:10px 0">
      <div id="launcher-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px"></div>
    </div>
  </div>

  <!-- Quick search overlay (hidden by default) -->
  <div id="quick-search-overlay" style="display:none;position:fixed;left:84px;bottom:calc(var(--taskbar-h)+20px);z-index:2000">
    <div style="padding:10px;border-radius:10px;background:var(--panel);border:1px solid rgba(255,255,255,0.03);box-shadow:var(--shadow);display:flex;gap:8px;align-items:center">
      <input id="quick-search-input" placeholder="Search web..." style="width:360px;padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);color:var(--text)">
      <button id="quick-search-go" class="primary-btn">Search</button>
      <button id="quick-search-close" class="control-btn">✕</button>
    </div>
  </div>

  <!-- Context menu -->
  <div id="context-menu" role="menu" aria-hidden="true" style="display:none">
    <div class="ctx-item" data-action="open" role="menuitem">Open</div>
    <div class="ctx-item" data-action="edit" role="menuitem">Edit (enable move)</div>
    <div class="ctx-item" data-action="pin" role="menuitem">Pin to Taskbar</div>
    <div class="ctx-item" data-action="delete" role="menuitem">Remove</div>
  </div>

  <script>
    // Wrap initialization to avoid partial initialization / errors blocking everything
    document.addEventListener('DOMContentLoaded', () => {
      try {
        // Helpers & state
        const $ = s => document.querySelector(s);
        const $$ = s => Array.from(document.querySelectorAll(s));
        function el(tag, attrs = {}) { const e = document.createElement(tag); for (const k in attrs) e.setAttribute(k, attrs[k]); return e; }
        function showToast(msg, t = 2200) { const to = el('div'); to.className = 'eos-toast'; to.textContent = msg; document.body.appendChild(to); setTimeout(() => { to.style.opacity = 0; setTimeout(() => to.remove(), 220); }, t); }

        const KEY_APPS = 'eclipse_apps_v_safe';
        const KEY_ICONS = 'eclipse_icons_v_safe';
        const KEY_SETTINGS = 'eclipse_settings_v_safe';

       const presetLibrary = [
  {
    id: 'home',
    name: 'Eclipse Home',
    url: 'https://7-7-7-14.github.io/active',
    icon: '/assets/browsericons/home.png',
    label: 'Eclipse://Home'
  },

  {
    id: 'games',
    name: 'Games',
    url: 'https://eclipsev6.github.io/g/',
    icon: '/assets/browsericons/games.png',
    label: 'Eclipse://Games'
  },

  {
    id: 'movies',
    name: 'Movies',
    url: 'https://eclipsev6.github.io/m/',
    icon: '/assets/browsericons/movies.png',
    label: 'Eclipse://Movies'
  },

  {
    id: 'launcher',
    name: 'Launcher',
    url: 'https://eclipsev6.github.io/l/',
    icon: '/assets/browsericons/launcher.png',
    label: 'Eclipse://Launcher'
  },

  {
    id: 'phoenix',
    name: 'Phoenix',
    url: 'https://eclipsev6.github.io/m/p/',
    icon: '/assets/browsericons/phoenix.png',
    label: 'Eclipse://Phoenix'
  }
];

        let installedApps = JSON.parse(localStorage.getItem(KEY_APPS) || '[]');
        let desktopIconsPersist = JSON.parse(localStorage.getItem(KEY_ICONS) || '[]');
        let settings = JSON.parse(localStorage.getItem(KEY_SETTINGS) || '{}');

        settings.windowOpacity = settings.windowOpacity ?? 0.95;
        settings.proxyBase = settings.proxyBase ?? '';
        settings.cloakEnabled = settings.cloakEnabled ?? true;
        settings.cloak = settings.cloak || { title: 'Eclipse', favicon: '/assets/logo/logo.png' };
        settings.devMode = settings.devMode ?? false;

        document.documentElement.style.setProperty('--window-opacity', String(settings.windowOpacity));
        if (settings.devMode) document.body.classList.add('dev-mode');

        function saveState() {
          localStorage.setItem(KEY_APPS, JSON.stringify(installedApps));
          localStorage.setItem(KEY_ICONS, JSON.stringify(desktopIconsPersist));
          localStorage.setItem(KEY_SETTINGS, JSON.stringify(settings));
        }

        // placeholder icon generator
        function makePlaceholderIcon(text) {
          const size = 128, r = 20;
          const c = document.createElement('canvas'); c.width = size; c.height = size;
          const ctx = c.getContext('2d');
          const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#ff1f3a';
          const accent2 = getComputedStyle(document.documentElement).getPropertyValue('--accent-2').trim() || '#c30f24';
          const g = ctx.createLinearGradient(0, 0, size, size); g.addColorStop(0, accent); g.addColorStop(1, accent2);
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(size - r, 0); ctx.quadraticCurveTo(size, 0, size, r); ctx.lineTo(size, size - r); ctx.quadraticCurveTo(size, size, size - r, size); ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r); ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0); ctx.closePath(); ctx.fill();
          ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fillRect(0, 0, size, size);
          ctx.fillStyle = '#fff'; ctx.font = 'bold 64px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          const letter = (text || '?').toString().trim().charAt(0).toUpperCase();
          ctx.fillText(letter, size / 2, size / 2 + 6);
          return c.toDataURL();
        }

        function resolveUrlForIframe(raw) {
          if (!raw) return '';
          const u = raw.trim();
          const full = (u.startsWith('http://') || u.startsWith('https://')) ? u : ('https://' + u);
          if (settings.proxyBase && settings.proxyBase.length > 3) return settings.proxyBase + encodeURIComponent(full);
          return full;
        }

        // basic UI wiring (safe: check element exists before using)
        const launcherBtn = $('#start-btn');
        const launcherPanel = $('#launcher');
        const launcherGrid = $('#launcher-grid');
        const launcherSearch = $('#launcher-search');
        const taskbar = $('#taskbar-icons');
        const quickStore = $('#quick-store');
        const quickSearch = $('#quick-search');
        const quickOverlay = $('#quick-search-overlay');
        const quickInput = $('#quick-search-input');
        const quickGo = $('#quick-search-go');
        const quickClose = $('#quick-search-close');

        function buildTile(item) {
          const tile = el('div'); tile.style.padding = '10px'; tile.style.borderRadius = '12px'; tile.style.textAlign = 'center'; tile.style.cursor = 'pointer';
          const img = el('img'); img.src = item.icon || makePlaceholderIcon(item.name || item.label || 'App'); img.style.width = '56px'; img.style.height = '56px'; img.style.borderRadius = '10px';
          const lbl = el('div'); lbl.textContent = item.name || item.label; lbl.style.marginTop = '8px'; lbl.style.fontSize = '13px';
          tile.appendChild(img); tile.appendChild(lbl);
          tile.addEventListener('click', () => { if (launcherPanel) launcherPanel.style.display = 'none'; if (item.action) item.action(); else openInstalledApp(item); });
          return tile;
        }

        function populateLauncher(filter = '') {
          if (!launcherGrid) return;
          launcherGrid.innerHTML = '';
          const builtin = [
            { id: 'browser', name: 'Browser', icon: '/assets/browsericons/browser.png', action: () => openBuiltIn('browser') },
            { id: 'files', name: 'Files', icon: '/assets/browsericons/files.png', action: () => openBuiltIn('files') },
            { id: 'settings', name: 'Settings', icon: '/assets/browsericons/settings.png', action: () => openBuiltIn('settings') },
            { id: 'store', name: 'Store', icon: '/assets/browsericons/store.png', action: () => openBuiltIn('store') }
          ];
          const items = builtin.concat(installedApps || []);
          const filtered = items.filter(it => !filter || (it.name || it.label || '').toLowerCase().includes(filter.toLowerCase()));
          for (const it of filtered) launcherGrid.appendChild(buildTile(it));
        }

        if (launcherBtn) {
          launcherBtn.addEventListener('click', () => {
            if (!launcherPanel) return;
            launcherPanel.style.display = launcherPanel.style.display === 'none' || !launcherPanel.style.display ? 'block' : 'none';
            populateLauncher();
          });
        }
        if ($('#launcher-close')) $('#launcher-close').addEventListener('click', () => { if (launcherPanel) launcherPanel.style.display = 'none'; });
        if (launcherSearch) launcherSearch.addEventListener('input', (e) => populateLauncher(e.target.value));
        if (quickStore) quickStore.addEventListener('click', () => openBuiltIn('store'));

        // quick-search wiring (safe)
        if (quickSearch && quickOverlay) {
          quickSearch.addEventListener('click', () => {
            quickOverlay.style.display = quickOverlay.style.display === 'none' || !quickOverlay.style.display ? 'block' : 'none';
            setTimeout(() => quickInput && quickInput.focus(), 50);
          });
        }
        if (quickClose) quickClose.addEventListener('click', () => { quickOverlay.style.display = 'none'; });
        if (quickGo) quickGo.addEventListener('click', () => {
          const q = (quickInput && quickInput.value || '').trim();
          if (q) { openBrowser({ url: 'https://duckduckgo.com/?q=' + encodeURIComponent(q), label: 'Eclipse://Search' }); quickOverlay.style.display = 'none'; if (quickInput) quickInput.value = ''; }
        });

        // initial seed
        if (!Array.isArray(installedApps) || installedApps.length === 0) {
          installedApps = [];
          presetLibrary.forEach(p => installedApps.push({ id: p.id || ('preset-' + Math.random().toString(36).slice(2, 8)), name: p.name, url: p.url, icon: p.icon, label: p.label }));
          saveState();
        }
        populateLauncher();

        /* Desktop icons: render persisted icons (safe) */
        function renderPersistedIcons() {
          try {
            $$('.desktop-icon[data-custom-id]').forEach(n => n.remove());
            for (const it of (desktopIconsPersist || [])) {
              if (document.querySelector('.desktop-icon[data-custom-id="' + it.id + '"]')) continue;
              const d = el('div'); d.className = 'desktop-icon'; d.dataset.customId = it.id; d.dataset.app = it.appRef || it.url || '';
              d.style.top = it.top; d.style.left = it.left; d.style.zIndex = 90;
              const img = el('img'); img.src = it.icon || makePlaceholderIcon(it.name || it.label || '?'); const sp = el('span'); sp.textContent = it.name || it.label || 'App';
              d.appendChild(img); d.appendChild(sp);
              document.getElementById('desktop').appendChild(d);
              attachIconHandlers(d);
            }
          } catch (e) { console.warn('renderPersistedIcons failed', e); }
        }
        renderPersistedIcons();

        function attachIconHandlers(node) {
          try {
            node.addEventListener('dblclick', () => {
              const appRef = node.dataset.app || node.dataset.name;
              if (!appRef) return;
              const byId = (installedApps || []).find(x => x.id === appRef);
              if (byId) openInstalledApp(byId);
              else if (appRef.startsWith('http') || appRef.startsWith('https')) openUrlInBrowser(appRef);
              else openBuiltIn(node.dataset.app || node.dataset.name || 'browser');
            });
            node.addEventListener('contextmenu', (e) => { e.preventDefault(); showContextMenuFor(node, e.clientX, e.clientY); });
          } catch (e) { console.warn('attachIconHandlers:', e); }
        }

        function showContextMenuFor(node, x, y) {
  const ctx = $('#context-menu');
  if (!ctx) return;

  ctx.style.display = 'block';
  ctx.style.left = x + 'px';
  ctx.style.top = y + 'px';
  ctx.style.zIndex = '99999';

  function onClick(ev) {
    const action = ev.target.dataset.action;

    if (action === 'open')
      node.dispatchEvent(new MouseEvent('dblclick'));

    else if (action === 'edit')
      enableIconEdit(node);

    else if (action === 'pin')
      pinToTaskbar(node);

    else if (action === 'delete')
      removeDesktopIcon(node);

    ctx.style.display = 'none';
    ctx.removeEventListener('click', onClick);
  }

  ctx.addEventListener('click', onClick);
}

        function enableIconEdit(node) {
          try {
            const done = el('div'); done.style.position = 'fixed'; done.style.left = '16px'; done.style.bottom = (parseInt(getComputedStyle($('#taskbar')).height) + 24) + 'px'; done.style.zIndex = 2200;
            done.innerHTML = '<button id="icon-done" style="padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer">Done</button>';
            document.body.appendChild(done);
            node.style.cursor = 'grab';
            node.classList.add('editable');
            function onDown(e) {
              if (e.button !== 0) return;
              e.preventDefault();
              const rect = node.getBoundingClientRect();
              const offsetX = e.clientX - rect.left, offsetY = e.clientY - rect.top;
              function onMove(ev) { node.style.left = (ev.clientX - offsetX) + 'px'; node.style.top = (ev.clientY - offsetY) + 'px'; }
              function onUp(ev) {
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                const id = node.dataset.customId || ('c-' + Math.random().toString(36).slice(2, 9));
                node.dataset.customId = id;
                const rec = { id, name: node.querySelector('span')?.textContent || 'App', icon: node.querySelector('img')?.src || null, top: node.style.top, left: node.style.left, appRef: node.dataset.app || '' };
                const idx = (desktopIconsPersist || []).findIndex(x => x.id === id);
                if (idx >= 0) desktopIconsPersist[idx] = rec; else desktopIconsPersist.push(rec);
                saveState();
              }
              document.addEventListener('pointermove', onMove);
              document.addEventListener('pointerup', onUp);
            }
            node.addEventListener('pointerdown', onDown);
            done.querySelector('#icon-done').addEventListener('click', () => {
              node.style.cursor = 'default'; node.classList.remove('editable'); done.remove(); const clone = node.cloneNode(true); node.parentNode.replaceChild(clone, node); attachIconHandlers(clone);
            });
          } catch (e) { console.warn('enableIconEdit error', e); }
        }

       function pinToTaskbar(node) {

  const img =
    node.querySelector('img')?.src ||
    makePlaceholderIcon("A");

  const name =
    node.querySelector('span')?.textContent ||
    "App";

  const t = document.createElement("div");

  t.className = "taskbar-icon";

  t.innerHTML = `
    <img src="${img}">
    <div class="dot"></div>
  `;

  taskbar.appendChild(t);

  // launch
  t.addEventListener("click", () => {
    node.dispatchEvent(new MouseEvent("dblclick"));
  });

  // right click
  t.addEventListener("contextmenu", e => {

    e.preventDefault();

    const menu = document.createElement("div");

    menu.className = "pin-menu";

    menu.style.left = e.clientX + "px";
    menu.style.top  = e.clientY + "px";

    menu.innerHTML = `
      <div class="pin-item">Unpin from Taskbar</div>
    `;

    document.body.appendChild(menu);

    menu.querySelector(".pin-item")
      .addEventListener("click", () => {
        t.remove();
        menu.remove();
        showToast(name + " unpinned");
      });

    document.addEventListener("click", () => {
      menu.remove();
    }, { once:true });

  });

}
function removeDesktopIcon(node) {

  const appRef = node.dataset.app;
  const appName = node.querySelector("span")?.textContent;

  if (!confirm(`Remove ${appName}?`))
    return;

  // Remove icon from desktop
  node.remove();

  // Remove saved desktop icon
  desktopIconsPersist =
    desktopIconsPersist.filter(icon =>
      icon.appRef !== appRef
    );

  // Remove installed app by ID OR name
  installedApps =
    installedApps.filter(app =>
      app.id !== appRef &&
      app.name !== appName
    );

  saveState();

  populateLauncher();

  showToast(appName + " removed");
}

        /* Smooth draggable helper (requestAnimationFrame batch + pointer capture) */
        function makeDraggable(elm, handle) {
          handle.style.touchAction = 'none';
          let pointerId = null, startX = 0, startY = 0, startLeft = 0, startTop = 0, rafId = null;
          function onDown(e) {
            if (e.pointerType === 'mouse' && e.button !== 0) return;
            // Prevent dragging when clicking control buttons
            if (e.target.closest('.win-controls')) return;
            pointerId = e.pointerId;
            handle.setPointerCapture(pointerId);
            startX = e.clientX; startY = e.clientY;
            startLeft = parseFloat(getComputedStyle(elm).left) || 0;
            startTop = parseFloat(getComputedStyle(elm).top) || 0;
            function onMove(ev) {
              if (ev.pointerId !== pointerId) return;
              const dx = ev.clientX - startX, dy = ev.clientY - startY;
              if (rafId) cancelAnimationFrame(rafId);
              rafId = requestAnimationFrame(() => {
                elm.style.left = (startLeft + dx) + 'px';
                elm.style.top = (startTop + dy) + 'px';
              });
            }
            function onUp(ev) {
              if (ev.pointerId !== pointerId) return;
              handle.releasePointerCapture(pointerId);
              handle.removeEventListener('pointermove', onMove);
              handle.removeEventListener('pointerup', onUp);
              handle.removeEventListener('pointercancel', onUp);
              if (rafId) cancelAnimationFrame(rafId);
              pointerId = null;
            }
            handle.addEventListener('pointermove', onMove);
            handle.addEventListener('pointerup', onUp);
            handle.addEventListener('pointercancel', onUp);
          }
          handle.addEventListener('pointerdown', onDown);
        }

        /* Window factory with working mouse controls */
        function createWindow(opts = {}) {
          const width = opts.width || 900, height = opts.height || 600;
          const win = el('div'); win.className = 'window';
          win.style.width = width + 'px'; win.style.height = height + 'px';
          win.style.left = (60 + Math.random() * 120) + 'px'; win.style.top = (60 + Math.random() * 80) + 'px';
          const tb = el('div'); tb.className = 'titlebar';
          const t = el('div'); t.className = 'title'; t.textContent = opts.title || 'Window';
          const controls = el('div'); controls.className = 'win-controls';
          controls.innerHTML = '<button class="control-btn minimize" title="Minimize">_</button><button class="control-btn maximize" title="Maximize">▢</button><button class="control-btn fullscreen" title="Fullscreen">⤢</button><button class="control-btn close" title="Close">×</button>';
          tb.appendChild(t); tb.appendChild(controls);
          const content = el('div'); content.className = 'content';
          win.appendChild(tb); win.appendChild(content); document.body.appendChild(win);

          const btnMin = controls.querySelector('.minimize'), btnMax = controls.querySelector('.maximize'), btnFull = controls.querySelector('.fullscreen'), btnClose = controls.querySelector('.close');

          btnMin.addEventListener('click', () => { win.style.display = 'none'; if (win._taskbarIcon) win._taskbarIcon.classList.add('active'); });
          btnMax.addEventListener('click', () => {
            if (!win.classList.contains('maximized')) { win._prevBounds = { left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height }; win.classList.add('maximized'); const all = Array.from(document.querySelectorAll('.window')); const top = Math.max(0, ...all.map(w => Number(w.style.zIndex || 0))); win.style.zIndex = top + 1; }
            else { win.classList.remove('maximized'); if (win._prevBounds) { win.style.left = win._prevBounds.left; win.style.top = win._prevBounds.top; win.style.width = win._prevBounds.width; win.style.height = win._prevBounds.height; win._prevBounds = null; } }
          });
          btnFull.addEventListener('click', async () => { try { if (!document.fullscreenElement) await win.requestFullscreen(); else await document.exitFullscreen(); } catch (e) { console.warn('fullscreen failed', e); } });
          btnClose.addEventListener('click', () => { if (win._taskbarIcon) win._taskbarIcon.remove(); win.remove(); if (win._appliedCloak) restoreTabCloak(); });

          makeDraggable(win, tb);
          return { win, content, titlebar: tb };
        }

        /* Browser (iframe) with overlay fallback and a few helper features */
        function openBrowser({ url = '', label = 'Eclipse://Browser', cloak = null } = {}) {
          try {
            const { win, content } = createWindow({ title: label, width: 1000, height: 640 });
            content.innerHTML = `
              <div style="height:100%;display:flex;flex-direction:column">
                <div class="browser-toolbar">
                  <button class="browser-btn back" title="Back">←</button>
                  <button class="browser-btn forward" title="Forward">→</button>
                  <div class="browser-address"><img class="browser-favicon"><div class="label">${label}</div><input class="real-url" value="${url}"></div>
                  <button class="browser-btn reload" title="Reload">⟳</button>
                  <button class="browser-btn home" title="Home" aria-label="Home">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="display:block"><path d="M3 11.5L12 4l9 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 21V11h14v10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="browser-btn bookmark" title="Bookmark">☆</button>
                  <button class="browser-btn popout" title="Pop out">⤢</button>
                  <button class="browser-btn copyurl" title="Copy URL">📋</button>
                  <button class="browser-btn open-new" title="Open in new tab">↗</button>
                </div>
                <div class="browser-page" style="position:relative">
                  <iframe sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals" src="${resolveUrlForIframe(url)}" allow="geolocation; microphone; camera; clipboard-read; clipboard-write"></iframe>
                </div>
              </div>
            `;
            const iframe = content.querySelector('iframe');
            const realUrlInput = content.querySelector('.real-url');
            const faviconEl = content.querySelector('.browser-favicon');

            faviconEl.src = cloak?.favicon || settings.cloak.favicon || ('https://www.google.com/s2/favicons?domain=' + (getDomain(url) || location.hostname));

            // small per-window history (for address-entered loads)
            win._history = win._history || [];
            win._historyIndex = win._historyIndex ?? -1;
            function pushHistory(u) { if (win._history[win._historyIndex] === u) return; if (win._historyIndex < win._history.length - 1) win._history.splice(win._historyIndex + 1); win._history.push(u); win._historyIndex = win._history.length - 1; }

            if (url) pushHistory(url);

            // controls
            const backBtn = content.querySelector('.back'), fwdBtn = content.querySelector('.forward');
            content.querySelector('.reload').addEventListener('click', () => { iframe.src = iframe.src; });
            content.querySelector('.home').addEventListener('click', () => { const h = presetLibrary[0]?.url || ''; realUrlInput.value = h; iframe.src = resolveUrlForIframe(h); content.querySelector('.label').textContent = presetLibrary[0]?.label || 'Eclipse://Home'; pushHistory(h); });
            content.querySelector('.open-new').addEventListener('click', () => { const to = realUrlInput.value; if (!to) return; window.open(to.startsWith('http') ? to : ('https://' + to), '_blank'); });
            content.querySelector('.bookmark').addEventListener('click', () => { const u = realUrlInput.value.trim() || iframe.src; if (!u) { showToast('No URL to bookmark'); return; } const nm = content.querySelector('.label').textContent || u; bookmarks = JSON.parse(localStorage.getItem('eclipse_bookmarks_v1') || '[]'); bookmarks.push({ id: 'bm-' + Math.random().toString(36).slice(2, 8), title: nm, url: u }); localStorage.setItem('eclipse_bookmarks_v1', JSON.stringify(bookmarks)); showToast('Bookmarked'); });
            content.querySelector('.popout').addEventListener('click', () => { const u = realUrlInput.value.trim() || iframe.src; if (!u) return; window.open(u.startsWith('http') ? u : ('https://' + u), '_blank'); });
            content.querySelector('.copyurl').addEventListener('click', async () => { const u = realUrlInput.value.trim() || iframe.src; if (!u) return showToast('No URL to copy'); try { await navigator.clipboard.writeText(u); showToast('URL copied'); } catch (e) { showToast('Copy failed'); } });

            backBtn.addEventListener('click', () => { if (win._historyIndex > 0) { win._historyIndex -= 1; const u = win._history[win._historyIndex]; iframe.src = resolveUrlForIframe(u); realUrlInput.value = u; } else showToast('No back history'); });
            fwdBtn.addEventListener('click', () => { if (win._historyIndex < win._history.length - 1) { win._historyIndex += 1; const u = win._history[win._historyIndex]; iframe.src = resolveUrlForIframe(u); realUrlInput.value = u; } else showToast('No forward history'); });

            realUrlInput.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') {
                const val = realUrlInput.value.trim();
                if (!val) return;
                iframe.src = resolveUrlForIframe(val);
                content.querySelector('.label').textContent = 'Eclipse://Browser';
                if (settings.cloakEnabled) { applyTabCloak(settings.cloak); win._appliedCloak = true; }
                pushHistory(val);
              }
            });

            // iframe overlay fallback (lightweight and safe)
            let overlay = null;
            function removeOverlay() { if (overlay) { overlay.remove(); overlay = null; } }
            iframe.addEventListener('load', () => {
              removeOverlay();
              // we avoid risky same-origin checks; show nothing else — user can open in new tab via UI
            });
            iframe.addEventListener('error', () => {
              removeOverlay();
              overlay = el('div'); overlay.className = 'iframe-overlay';
              overlay.innerHTML = `<div style="font-weight:700">Failed to load</div><div style="display:flex;gap:8px"><button id="ov-new" class="primary-btn">Open in new tab</button><button id="ov-retry" class="small-btn">Retry</button></div><div style="margin-top:8px;color:var(--muted);word-break:break-all">${iframe.src}</div>`;
              content.querySelector('.browser-page').appendChild(overlay);
              overlay.querySelector('#ov-new').addEventListener('click', () => window.open(iframe.src.startsWith('http') ? iframe.src : decodeURIComponent(iframe.src), '_blank'));
              overlay.querySelector('#ov-retry').addEventListener('click', () => { removeOverlay(); iframe.src = iframe.src; });
            });

            // taskbar icon binding
            const t = el('div'); t.className = 'taskbar-icon'; t.innerHTML = `<img src="${(installedApps && installedApps[0] && installedApps[0].icon) || '/assets/icons/browser.png'}"><div class="dot"></div>`;
            t.addEventListener('click', () => {
              if (win.style.display === 'none') { win.style.display = 'flex'; t.classList.remove('active'); const all = Array.from(document.querySelectorAll('.window')); const top = Math.max(0, ...all.map(w => Number(w.style.zIndex || 0))); win.style.zIndex = top + 1; }
              else { win.style.display = 'none'; t.classList.add('active'); }
            });
            taskbar && taskbar.appendChild(t);
            win._taskbarIcon = t;

            if (settings.cloakEnabled) { applyTabCloak(cloak || settings.cloak); win._appliedCloak = true; }
            return { win, iframe };
          } catch (err) {
            console.error('openBrowser failed', err);
            showToast('Failed to open Browser (see console)');
          }
        }

        function openBuiltIn(name) {

        }

         content.innerHTML = `

            const op = content.querySelector('#s-opacity'); if (op) op.addEventListener('input', (e) => { settings.windowOpacity = Number(e.target.value); document.documentElement.style.setProperty('--window-opacity', String(settings.windowOpacity)); saveState(); });
            const pr = content.querySelector('#s-proxy'); const resetApps =
  content.querySelector("#reset-apps");

if(resetApps){

            if (pr) pr.addEventListener('input', (e) => { settings.proxyBase = e.target.value.trim(); saveState(); });

        function openFiles() { const { win, content } = createWindow({ title: 'Files', width: 720, height: 440 }); content.innerHTML = `<div class="settings-card"><h3>Files (demo)</h3><p class="muted">No iframe here — will not be blank.</p></div>`; }

        function openStore() {

            content.innerHTML = `<div style="display:flex;flex-direction:column;gap:12px"><div style="display:flex;justify-content:space-between;align-items:center"><div><h3 style="margin:0">Preset Library</h3><p class="muted" style="margin:0">Install preset apps</p></div><div style="display:flex;gap:8px"><input id="store-filter" placeholder="Filter" style="padding:8px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);color:var(--text)"><button id="store-refresh" class="small-btn">Refresh</button></div></div><div id="store-lib" class="store-grid"></div><hr><div><h3 style="margin:0">Installed</h3><div id="store-installed" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px"></div></div></div>`;
